[pytest]
# Pytest configuration for the Plug Puller v5 STL Validation Framework.
# See tests/conftest.py for the marker and fixture wiring.

python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

testpaths = tests

addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

markers =
    requires_openscad: Test requires the OpenSCAD CLI to be installed
    slow: Slow test (>10s)

log_cli = false
log_cli_level = INFO
log_file = test_results.log
log_file_level = DEBUG

# Honoured by pytest-timeout when installed; ignored otherwise.
timeout = 300
timeout_method = thread
