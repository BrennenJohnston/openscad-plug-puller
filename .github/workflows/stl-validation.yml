# STL Validation CI/CD Workflow
#
# Validates the Plug Puller OpenSCAD model against golden mesh fixtures so
# any drift in geometry, customizer hygiene, or schema-vs-source parity is
# caught before it lands on `develop` / `main`.
#
# Adapted from the braille-stl-generator-openscad pipeline, trimmed for
# plug-puller scope (single OpenSCAD generator, trimesh-only mesh comparison,
# no CloudCompare).
#
# Triggers:
# - Push to main / master / develop
# - Pull requests targeting main / master / develop
# - Manual dispatch
#
# Jobs (DAG):
#   lint --> test-quick --> test-full
#       \--> check-fixtures
#   summary depends on all four.
#
# Pinned tooling:
# - OpenSCAD 2026.01.03 nightly (Manifold backend) for byte-reproducible STLs
# - Python 3.11
# - Golden fixtures (tests/fixtures/**/reference.stl) are committed as plain
#   binary STLs — no Git LFS required for a clone or CI run.

name: STL Validation

on:
  push:
    branches: [main, master, develop]
    paths:
      - "**.scad"
      - "tests/**"
      - "scripts/**"
      - "src/**"
      - "dist/**"
      - "presets/**"
      - "parameter_mapping.json"
      - "requirements-dev.txt"
      - "pytest.ini"
      - ".github/workflows/stl-validation.yml"
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      skip_render_tests:
        description: "Skip the OpenSCAD render / mesh-compare job"
        required: false
        default: false
        type: boolean

env:
  CI: "true"
  OPENSCAD_VERSION: "2026.01.03"
  PYTHON_VERSION: "3.11"

jobs:
  # ==========================================================================
  # Job 1: Lint (Python style + JSON syntax + parameter schema parity)
  # ==========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "requirements-dev.txt"

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff on tests/ and scripts/
        run: ruff check tests/ scripts/

      - name: Validate parameter schema vs SCAD source
        run: python tests/validate_parameter_schema.py

      - name: Verify flattened single-file build is fresh (dist/)
        # dist/Plug_Puller_SingleFile.scad is a committed generated
        # artifact (single-file requirement for MakerWorld PMM and the
        # openscad-playground `?src=` path). Fails when src/ changed
        # without regenerating it. Render-level parity against the golden
        # fixtures runs in the test-full lane (tests/test_flattened_build.py).
        run: python scripts/build_flattened.py --check

      - name: Validate JSON syntax (presets, parameter mapping, compare config)
        run: |
          python -c "import json; json.load(open('presets/Plug_Puller_Parametric.json'))"
          python -c "import json; json.load(open('parameter_mapping.json'))"
          python -c "import json; json.load(open('tests/compare_config.json'))"

  # ==========================================================================
  # Job 2: Quick tests (no OpenSCAD required)
  # ==========================================================================
  test-quick:
    name: Quick Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "requirements-dev.txt"

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Run lint-only pytest cases (Customizer / preset routing / schema)
        # Exclude `requires_openscad` so the lint lane stays under a minute and
        # never depends on a CAD binary. The render lane runs the rest.
        run: pytest -m "not requires_openscad"

  # ==========================================================================
  # Job 3: Full STL validation (OpenSCAD render + golden fixture compare)
  # ==========================================================================
  test-full:
    name: STL Validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test-quick
    if: github.event.inputs.skip_render_tests != 'true'

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # Future expansion: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "requirements-dev.txt"

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      # ---------- OpenSCAD installation (Linux) -------------------------------
      - name: Install OpenSCAD ${{ env.OPENSCAD_VERSION }} (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          # The OpenSCAD nightly AppImage bundles Qt and most of its runtime
          # but still dynamically links against the host's OpenGL / EGL / xcb
          # stack. Install those system libraries up front so AppRun.wrapped
          # doesn't fail with libEGL.so.1 / libxcb-* "cannot open shared
          # object file" before the version banner ever prints.
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libgles2 \
            libopengl0 \
            libglu1-mesa \
            libglib2.0-0t64 \
            libdbus-1-3 \
            libfontconfig1 \
            libfreetype6 \
            libharfbuzz0b \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-util1 \
            libxcb-xfixes0 \
            libxcb-xkb1 \
            libxkbfile1

          # Try the dated snapshots URL first (where the 2026.01.03 nightly
          # actually lives) and fall back to the top-level files.openscad.org
          # path if a matching tagged release is published later.
          wget -q "https://files.openscad.org/snapshots/OpenSCAD-${{ env.OPENSCAD_VERSION }}-x86_64.AppImage" -O openscad.AppImage || \
          wget -q "https://files.openscad.org/OpenSCAD-${{ env.OPENSCAD_VERSION }}-x86_64.AppImage" -O openscad.AppImage
          chmod +x openscad.AppImage

          # Extract the AppImage so we don't need FUSE on the runner.
          ./openscad.AppImage --appimage-extract
          sudo mv squashfs-root /opt/openscad

          # AppRun must be invoked from inside its directory so its relative
          # library paths resolve. A thin wrapper does that for us and lets
          # `openscad` work from anywhere on $PATH.
          sudo tee /usr/local/bin/openscad > /dev/null << 'EOF'
          #!/bin/bash
          cd /opt/openscad && exec ./AppRun "$@"
          EOF
          sudo chmod +x /usr/local/bin/openscad

          openscad --version

      - name: Verify OpenSCAD version and Manifold backend
        run: |
          echo "=== OpenSCAD version ==="
          openscad --version
          echo ""
          echo "=== Manifold backend probe (matches OpenSCADRunner._detect_manifold_support) ==="
          openscad --help 2>&1 | grep -i "manifold" || echo "WARNING: Manifold not visible in --help; conftest.py will fail in CI mode."

      - name: Run STL render + golden fixture comparison
        # CI=true is set in `env:` above. tests/conftest.py honours it to
        # enforce the pinned OpenSCAD version + require the Manifold backend.
        # `-m requires_openscad` selects every render-lane test (golden
        # fixture comparison, derivation echo parity, reference parity, flattened
        # single-file build parity) without repeating the quick lane.
        run: pytest -m requires_openscad -v

      - name: Upload rendered STL artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: openscad-render-output-${{ matrix.os }}
          path: |
            test_results.log
            **/openscad_render_*.stl
          retention-days: 7
          if-no-files-found: ignore

  # ==========================================================================
  # Job 4: Fixture integrity (reference STL guard)
  # ==========================================================================
  check-fixtures:
    name: Fixture Integrity
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify every fixture has params + reference STL + metadata
        # Each fixture directory must contain all three artefacts. A real STL
        # is at least 1 KB; anything smaller (e.g. a stray LFS pointer or a
        # truncated commit) is treated as corrupt.
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          fixtures=(tests/fixtures/*/)
          if [ ${#fixtures[@]} -eq 0 ]; then
            echo "ERROR: tests/fixtures/ is empty — golden fixtures are missing."
            exit 1
          fi

          fail=0
          for dir in "${fixtures[@]}"; do
            name=$(basename "$dir")
            echo "--- $name ---"

            for required in params.json reference.stl metadata.json; do
              if [ ! -f "$dir$required" ]; then
                echo "  MISSING: $dir$required"
                fail=1
                continue
              fi
              size=$(stat -c%s "$dir$required")
              echo "  $required -> ${size} bytes"

              # reference.stl must be a real binary STL, not a pointer stub.
              if [ "$required" = "reference.stl" ] && [ "$size" -lt 1024 ]; then
                echo "    ERROR: reference.stl looks corrupt (size < 1 KB)."
                fail=1
              fi
            done
          done

          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "Fixture integrity check FAILED."
            exit 1
          fi
          echo ""
          echo "All ${#fixtures[@]} fixture(s) hydrated and complete."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "requirements-dev.txt"

      - name: Validate fixture metadata JSON structure
        run: |
          python - <<'PY'
          import json
          import pathlib
          import sys

          # Keys written by scripts/regenerate_fixtures.py — keep in sync.
          required_meta_keys = {
              "fixture",
              "generated_at_utc",
              "openscad_version",
              "manifold_backend",
              "trimesh_properties",
              "parameters",
          }
          required_params_keys = {"parameters"}

          fixtures_root = pathlib.Path("tests/fixtures")
          failures = []
          for fixture_dir in sorted(p for p in fixtures_root.iterdir() if p.is_dir()):
              meta_path = fixture_dir / "metadata.json"
              params_path = fixture_dir / "params.json"
              try:
                  meta = json.loads(meta_path.read_text(encoding="utf-8"))
              except json.JSONDecodeError as exc:
                  failures.append(f"{meta_path}: {exc}")
                  continue
              try:
                  params = json.loads(params_path.read_text(encoding="utf-8"))
              except json.JSONDecodeError as exc:
                  failures.append(f"{params_path}: {exc}")
                  continue

              missing_meta = required_meta_keys - meta.keys()
              if missing_meta:
                  failures.append(f"{meta_path}: missing keys {sorted(missing_meta)}")
              missing_params = required_params_keys - params.keys()
              if missing_params:
                  failures.append(f"{params_path}: missing keys {sorted(missing_params)}")

              print(f"OK: {fixture_dir.name}")

          if failures:
              print("\nValidation failures:")
              for f in failures:
                  print(f"  - {f}")
              sys.exit(1)
          PY

  # ==========================================================================
  # Summary: collapse the four-job DAG to one red/green status row
  # ==========================================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test-quick, test-full, check-fixtures]
    if: always()

    steps:
      - name: Roll up results
        run: |
          echo "=== CI Summary ==="
          echo "Lint:           ${{ needs.lint.result }}"
          echo "Quick Tests:    ${{ needs.test-quick.result }}"
          echo "STL Validation: ${{ needs.test-full.result }}"
          echo "Fixture Check:  ${{ needs.check-fixtures.result }}"

          # `test-full` may legitimately be skipped via workflow_dispatch input;
          # treat success and skipped as passing, anything else as failure.
          fail=0
          for r in "${{ needs.lint.result }}" \
                   "${{ needs.test-quick.result }}" \
                   "${{ needs.check-fixtures.result }}"; do
            if [ "$r" != "success" ]; then
              fail=1
            fi
          done
          full="${{ needs.test-full.result }}"
          if [ "$full" != "success" ] && [ "$full" != "skipped" ]; then
            fail=1
          fi

          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "CI FAILED — see individual job logs."
            exit 1
          fi
          echo ""
          echo "All required CI checks passed."
